# ─── fibe.yml — Gemini CLI (Google) ──────────────────────────────────────────
#
# This file is auto-generated by Fibe Platform and mounted at /app/fibe.yml
# inside the agent container. fibe-agent reads it at startup and promotes
# values into process.env for downstream CLI tools.

# ── Agent Core ───────────────────────────────────────────────────────────────

agentProvider: gemini
agentPassword: pg-internal-abc123def456

# Model configuration — Gemini models
modelOptions: pro,flash,flash-lite
defaultModel: pro

systemPrompt: |
  You are an expert Python developer specializing in data pipelines
  and machine learning. Use type hints everywhere. Write pytest tests.

# ── Paths ────────────────────────────────────────────────────────────────────

dataDir: /app/data
sessionDir: /app/data/42/.gemini
marqueeRootDomain: my-marquee.fibe.gg

# ── Sync & Lifecycle ─────────────────────────────────────────────────────────

fibeSyncEnabled: true

postInitScript: |
  pip install -r /app/data/42/gemini_workspace/requirements.txt 2>/dev/null || true

# ── Credentials ──────────────────────────────────────────────────────────────
#
# Gemini uses API key authentication. The credential file is written
# to SESSION_DIR and the env var is set for the CLI.

agentCredentials:
  api_key.json: |
    {
      "client_id": "123456789.apps.googleusercontent.com",
      "client_secret": "GOCSPX-xxxxxxxxxxxxxxxxxxxxxxxx",
      "refresh_token": "1//xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx",
      "type": "authorized_user",
      "universe_domain": "googleapis.com"
    }

credentialEnv:
  GEMINI_API_KEY: AIzaSyxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx

# ── Runtime Files ────────────────────────────────────────────────────────────
#
# Provider-specific config files materialized on disk at startup.
# Gemini CLI reads settings.json from GEMINI_CLI_HOME.

agentRuntimeFiles:
  version: 1
  files:
    - path: /app/data/42/.gemini/settings.json
      format: json
      operation: deep_merge
      mode: "0600"
      content:
        security:
          auth:
            selectedType: oauth-personal
        coreTools:
          enableShell: true
          enableFileEditing: true
          enableSearch: true
        theme: monokai

# ── Cascade Settings ─────────────────────────────────────────────────────────

cliVersion: "1.0.42"

providerArgs:
  sandbox: false
  yolo: true

skillToggles:
  token-saver: true

syscheckEnabled: true

# ── MCP ──────────────────────────────────────────────────────────────────────

mcpConfig:
  mcpServers:
    fibe:
      command: fibe
      args:
        - mcp
        - serve
        - "--tools"
        - core
      env:
        FIBE_API_KEY: fibe_live_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
        FIBE_DOMAIN: fibe.gg
    filesystem:
      command: npx
      args:
        - "-y"
        - "@modelcontextprotocol/server-filesystem"
        - /app/data/42/gemini_workspace

# ── UI / Chat ────────────────────────────────────────────────────────────────

userAvatarUrl: https://avatars.githubusercontent.com/u/12345678
lockChatModel: false

# ── Network / Embedding ──────────────────────────────────────────────────────

corsOrigins: "https://fibe.gg https://*.fibe.gg"
frameAncestors: "https://fibe.gg https://*.fibe.gg"
