# ─── fibe.yml — OpenCode (MIT License) ───────────────────────────────────────
#
# This file is auto-generated by Fibe Platform and mounted at /app/fibe.yml
# inside the agent container. fibe-agent reads it at startup and promotes
# values into process.env for downstream CLI tools.

# ── Agent Core ───────────────────────────────────────────────────────────────

agentProvider: opencode
agentPassword: pg-internal-abc123def456
agentAuthMode: api-token

# OpenCode model options — supports OpenRouter and local models
modelOptions: openai/gpt-5.4,anthropic/claude-sonnet,openai/gpt-oss-120b:free
defaultModel: openai/gpt-oss-120b:free

systemPrompt: |
  You are a DevOps engineer specializing in Kubernetes, Terraform, and
  CI/CD pipelines. Write infrastructure as code. Document all changes
  in commit messages following Conventional Commits.

# ── Paths ────────────────────────────────────────────────────────────────────

dataDir: /app/data
sessionDir: /app/data/42/.local/share/opencode
marqueeRootDomain: my-marquee.fibe.gg

# ── Sync & Lifecycle ─────────────────────────────────────────────────────────

fibeSyncEnabled: true

postInitScript: |
  cd /app/data/42/opencode_workspace
  terraform init -backend=false 2>/dev/null || true

# ── Credentials ──────────────────────────────────────────────────────────────
#
# OpenCode uses OpenRouter API keys by default.

agentCredentials:
  config.json: |
    {
      "provider": "openrouter",
      "api_key": "sk-or-v1-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
    }

credentialEnv:
  OPENROUTER_API_KEY: sk-or-v1-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx

# ── Runtime Files ────────────────────────────────────────────────────────────
#
# opencode.json configures the OpenCode CLI.
# Written to the workspace root at startup.

agentRuntimeFiles:
  version: 1
  files:
    - path: /app/data/42/opencode_workspace/opencode.json
      format: text
      operation: write_if_missing
      mode: "0644"
      content: |
        {
          "$schema": "https://opencode.ai/config.json",
          "permission": "allow",
          "autoupdate": false,
          "share": "disabled"
        }

    - path: /app/data/42/opencode_workspace/.opencode/instructions.md
      format: text
      operation: write_if_missing
      mode: "0644"
      content: |
        # OpenCode Agent Instructions

        You are running inside a Fibe Playground. Follow the project's
        conventions. Use infrastructure-as-code patterns.

        ## Available Tools
        - Fibe MCP server for platform operations
        - Docker MCP server for container management

# ── Cascade Settings ─────────────────────────────────────────────────────────

cliVersion: "1.0.42"

providerArgs:
  auto-approve: true
  quiet: true

skillToggles:
  token-saver: true

syscheckEnabled: false

# ── MCP ──────────────────────────────────────────────────────────────────────

mcpConfig:
  mcpServers:
    fibe:
      command: fibe
      args:
        - mcp
        - serve
        - "--tools"
        - core
      env:
        FIBE_API_KEY: fibe_live_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
        FIBE_DOMAIN: fibe.gg
    docker:
      command: uvx
      args:
        - mcp-server-docker

# ── UI / Chat ────────────────────────────────────────────────────────────────

userAvatarUrl: https://avatars.githubusercontent.com/u/12345678
lockChatModel: false

# ── Network / Embedding ──────────────────────────────────────────────────────

corsOrigins: "https://fibe.gg https://*.fibe.gg"
frameAncestors: "https://fibe.gg https://*.fibe.gg"
