# ─── fibe.yml — OpenAI Codex CLI ─────────────────────────────────────────────
#
# This file is auto-generated by Fibe Platform and mounted at /app/fibe.yml
# inside the agent container. fibe-agent reads it at startup and promotes
# values into process.env for downstream CLI tools.

# ── Agent Core ───────────────────────────────────────────────────────────────

agentProvider: openai-codex
agentPassword: pg-internal-abc123def456

# Model configuration — OpenAI Codex models
modelOptions: gpt-5.4,gpt-5.3-codex,gpt-5.4-mini
defaultModel: gpt-5.4

systemPrompt: |
  You are a systems programmer working on a Go microservices architecture.
  Follow the project's existing conventions. All public functions must
  have godoc comments. Use table-driven tests.

# ── Paths ────────────────────────────────────────────────────────────────────

dataDir: /app/data
sessionDir: /app/data/42/.codex
marqueeRootDomain: my-marquee.fibe.gg

# ── Sync & Lifecycle ─────────────────────────────────────────────────────────

fibeSyncEnabled: true

postInitScript: |
  cd /app/data/42/codex_workspace
  go mod download 2>/dev/null || true

# ── Credentials ──────────────────────────────────────────────────────────────
#
# Codex uses an API key for authentication.

agentCredentials:
  auth.json: |
    {
      "token": "sk-proj-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx",
      "org_id": "org-xxxxxxxxxxxxxxxxxxxxxxxx"
    }

credentialEnv:
  OPENAI_API_KEY: sk-proj-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx

# ── Runtime Files ────────────────────────────────────────────────────────────
#
# codex.toml configures the Codex CLI behavior, permissions, and model.
# Written to CODEX_HOME at startup.

agentRuntimeFiles:
  version: 1
  files:
    - path: /app/data/42/.codex/codex.toml
      format: text
      operation: overwrite
      mode: "0644"
      content: |
        # Codex CLI configuration
        # https://github.com/openai/codex

        [model]
        name = "gpt-5.4"

        [history]
        persistence = "none"
        save_inputs = false

        [approval]
        auto_edit = true
        auto_run = [
          "bash",
          "python3",
          "go",
          "make",
          "cargo",
          "npm",
          "bun",
        ]

        [safety]
        ignore_file_patterns = [
          ".env",
          "*.key",
          "*.pem",
        ]

    - path: /app/data/42/.codex/instructions.md
      format: text
      operation: write_if_missing
      mode: "0644"
      content: |
        # Codex Agent Instructions

        You are running inside a Fibe Playground. Follow the project's
        coding standards and always write tests.

# ── Cascade Settings ─────────────────────────────────────────────────────────

cliVersion: "1.0.42"

providerArgs:
  full-auto: true
  quiet: true

skillToggles:
  token-saver: true

syscheckEnabled: true

# ── MCP ──────────────────────────────────────────────────────────────────────

mcpConfig:
  mcpServers:
    fibe:
      command: fibe
      args:
        - mcp
        - serve
        - "--tools"
        - core
      env:
        FIBE_API_KEY: fibe_live_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
        FIBE_DOMAIN: fibe.gg
    sentry:
      command: npx
      args:
        - "-y"
        - "@sentry/mcp-server"
      env:
        SENTRY_AUTH_TOKEN: sntrys_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx

# ── UI / Chat ────────────────────────────────────────────────────────────────

userAvatarUrl: https://avatars.githubusercontent.com/u/12345678
lockChatModel: false

# ── Network / Embedding ──────────────────────────────────────────────────────

corsOrigins: "https://fibe.gg https://*.fibe.gg"
frameAncestors: "https://fibe.gg https://*.fibe.gg"
