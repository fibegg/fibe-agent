# ─── fibe.yml — Cursor Agent ─────────────────────────────────────────────────
#
# This file is auto-generated by Fibe Platform and mounted at /app/fibe.yml
# inside the agent container. fibe-agent reads it at startup and promotes
# values into process.env for downstream CLI tools.

# ── Agent Core ───────────────────────────────────────────────────────────────

agentProvider: cursor
agentPassword: pg-internal-abc123def456
agentAuthMode: api-token

# Cursor manages its own model selection, so modelOptions is typically empty
defaultModel: claude-sonnet

systemPrompt: |
  You are a frontend specialist working with React, TypeScript, and
  TailwindCSS. Prioritize accessibility (a11y) and responsive design.
  Use Radix UI primitives for interactive components.

# ── Paths ────────────────────────────────────────────────────────────────────

dataDir: /app/data
sessionDir: /app/data/42/.cursor
marqueeRootDomain: my-marquee.fibe.gg

# ── Sync & Lifecycle ─────────────────────────────────────────────────────────

fibeSyncEnabled: true

postInitScript: |
  cd /app/data/42/cursor_workspace
  npm ci 2>/dev/null || true

# ── Credentials ──────────────────────────────────────────────────────────────
#
# Cursor uses its own auth token format.

agentCredentials:
  token.json: |
    {
      "accessToken": "cursor_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx",
      "refreshToken": "cursor_rt_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx",
      "expiresAt": "2026-12-31T23:59:59Z"
    }

credentialEnv:
  CURSOR_API_KEY: cursor_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx

# ── Runtime Files ────────────────────────────────────────────────────────────
#
# Cursor-specific configuration and rules files.

agentRuntimeFiles:
  version: 1
  files:
    - path: /app/data/42/.cursor/settings.json
      format: json
      operation: deep_merge
      mode: "0600"
      content:
        telemetry:
          enabled: false
        editor:
          formatOnSave: true
          tabSize: 2
        ai:
          model: claude-sonnet
          autoApply: true

    - path: /app/data/42/cursor_workspace/.cursor/rules/fibe-runtime.mdc
      format: text
      operation: overwrite
      mode: "0644"
      content: |
        ---
        description: Fibe Platform runtime rules
        globs: ["**/*"]
        alwaysApply: true
        ---

        # Fibe Runtime Rules

        You are running inside a Fibe Playground container.

        ## Constraints
        - Do not modify files outside the workspace directory
        - Always run tests before committing
        - Use the MCP tools available to you for platform operations

        ## Code Style
        - Use TypeScript strict mode
        - Prefer functional components with hooks
        - Use CSS modules or Tailwind for styling

# ── Cascade Settings ─────────────────────────────────────────────────────────

cliVersion: "1.0.42"

providerArgs:
  auto-apply: true

skillToggles:
  token-saver: true

syscheckEnabled: true

# ── MCP ──────────────────────────────────────────────────────────────────────

mcpConfig:
  mcpServers:
    fibe:
      command: fibe
      args:
        - mcp
        - serve
        - "--tools"
        - core
      env:
        FIBE_API_KEY: fibe_live_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
        FIBE_DOMAIN: fibe.gg
    brave-search:
      command: npx
      args:
        - "-y"
        - "@modelcontextprotocol/server-brave-search"
      env:
        BRAVE_API_KEY: BSAxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx

# ── UI / Chat ────────────────────────────────────────────────────────────────

userAvatarUrl: https://avatars.githubusercontent.com/u/12345678
lockChatModel: true

# ── Network / Embedding ──────────────────────────────────────────────────────

corsOrigins: "https://fibe.gg https://*.fibe.gg"
frameAncestors: "https://fibe.gg https://*.fibe.gg"
