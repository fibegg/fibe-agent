# ─── fibe.yml — Claude Code (Anthropic) ─────────────────────────────────────
#
# This file is auto-generated by Fibe Platform and mounted at /app/fibe.yml
# inside the agent container. fibe-agent reads it at startup and promotes
# values into process.env for downstream CLI tools.
#
# Priority (highest → lowest):
#   1. Individual env vars (always win)
#   2. FIBE_SETTINGS_JSON
#   3. /app/fibe.yml

# ── Agent Core ───────────────────────────────────────────────────────────────

agentProvider: claude-code
agentPassword: pg-internal-abc123def456
agentAuthMode: api-token

# Model configuration
modelOptions: haiku,sonnet,opus
defaultModel: sonnet

# System prompt injected into every conversation
systemPrompt: |
  You are a senior full-stack developer working on a Ruby on Rails + React
  application. Follow existing code patterns. Write tests for all changes.
  Use TypeScript for frontend code.

# ── Paths ────────────────────────────────────────────────────────────────────

dataDir: /app/data
sessionDir: /app/data/42/.claude
marqueeRootDomain: my-marquee.fibe.gg

# ── Sync & Lifecycle ─────────────────────────────────────────────────────────

fibeSyncEnabled: true

# Script executed after the agent container is fully initialized
postInitScript: |
  cd /app/data/42/claude_workspace
  git config --global user.name "Fibe Agent"
  git config --global user.email "agent@fibe.gg"

# ── Credentials ──────────────────────────────────────────────────────────────
#
# Files written to SESSION_DIR at startup by credential-injector.
# Keys are filenames, values are raw file content.

agentCredentials:
  agent_token.txt: sk-ant-sid01-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx

# Pre-computed env vars injected into process.env for native CLI tools.
# These let `claude` CLI authenticate without manual login.
credentialEnv:
  CLAUDE_CODE_OAUTH_TOKEN: sk-ant-sid01-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx

# ── Cascade Settings ─────────────────────────────────────────────────────────
#
# These settings cascade from Marquee → Playspec → Agent → fibe.yml

cliVersion: "1.0.42"

# Provider-specific CLI flags passed to the agent process
providerArgs:
  print: true
  verbose: true
  dangerously-skip-permissions: true
  model: sonnet

# Toggle individual skills on/off
skillToggles:
  token-saver: true
  code-review: false

# Enable system diagnostics on startup
syscheckEnabled: true

# ── MCP (Model Context Protocol) ─────────────────────────────────────────────
#
# MCP servers available to the agent. Each server provides tools
# that extend the agent's capabilities.

mcpConfig:
  mcpServers:
    fibe:
      command: fibe
      args:
        - mcp
        - serve
        - "--tools"
        - core
      env:
        FIBE_API_KEY: fibe_live_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
        FIBE_DOMAIN: fibe.gg
    docker:
      command: uvx
      args:
        - mcp-server-docker
    github:
      command: npx
      args:
        - "-y"
        - "@modelcontextprotocol/server-github"
      env:
        GITHUB_PERSONAL_ACCESS_TOKEN: ghp_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx

# ── UI / Chat ────────────────────────────────────────────────────────────────

userAvatarUrl: https://avatars.githubusercontent.com/u/12345678
assistantAvatarBase64: iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==
lockChatModel: false

# ── Network / Embedding ──────────────────────────────────────────────────────

corsOrigins: "https://fibe.gg https://*.fibe.gg"
frameAncestors: "https://fibe.gg https://*.fibe.gg"

# ── Gemma Router (optional local model routing) ──────────────────────────────

gemmaRouterEnabled: false
ollamaUrl: http://localhost:11434
gemmaModel: gemma3:4b
gemmaConfidenceThreshold: 0.7
gemmaTimeoutMs: 5000
