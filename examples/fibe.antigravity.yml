# fibe.yml — Google Antigravity CLI
#
# This file is auto-generated by Fibe Platform and mounted at /app/fibe.yml
# inside the agent container. fibe-agent reads it at startup and promotes
# values into process.env for downstream CLI tools.

agentProvider: antigravity
agentPassword: pg-internal-abc123def456

modelOptions: ""
defaultModel: ""

systemPrompt: |
  You are an expert TypeScript developer. Keep changes focused and verify them.

dataDir: /app/data
sessionDir: /app/data/42/.gemini
marqueeRootDomain: my-marquee.fibe.gg

fibeSyncEnabled: true

postInitScript: |
  npm install 2>/dev/null || true

# Antigravity uses Google OAuth through `agy`. Rails stores a runtime-auth
# marker after the authorization code is submitted; the runtime validates it
# by running the headless CLI.
agentCredentials:
  auth.json: |
    {
      "provider": "antigravity",
      "runtime_auth": true
    }

credentialEnv: {}

providerArgs:
  print-timeout: 30m

skillToggles:
  token-saver: true

syscheckEnabled: true

mcpConfig:
  mcpServers:
    fibe:
      command: fibe
      args:
        - mcp
        - serve
        - "--tools"
        - core
      env:
        FIBE_API_KEY: fibe_live_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
        FIBE_DOMAIN: fibe.gg
    filesystem:
      command: npx
      args:
        - "-y"
        - "@modelcontextprotocol/server-filesystem"
        - /app/data/42/antigravity_workspace

userAvatarUrl: https://avatars.githubusercontent.com/u/12345678
lockChatModel: false

corsOrigins: "https://fibe.gg https://*.fibe.gg"
frameAncestors: "https://fibe.gg https://*.fibe.gg"
